# Python/FastAPI 微服务配置示例

replicaCount: 2

image:
  repository: harbor.mycompany.com/mycloud/python-service
  pullPolicy: IfNotPresent
  tag: "v1.0.0"

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
  hosts:
    - host: python-service.mycloud.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 75

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 45
  periodSeconds: 15

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 5

env:
  - name: PYTHON_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "INFO"
  - name: WORKERS
    value: "4"
  - name: PORT
    value: "8000"
  - name: DATABASE_URL
    value: "postgresql://user@postgres-service:5432/mydb"

configMap:
  enabled: true
  data:
    settings.yaml: |
      app:
        name: "Python Microservice"
        version: "1.0.0"
      cors:
        allow_origins: ["*"]
        allow_methods: ["*"]

secret:
  enabled: true
  data:
    DATABASE_PASSWORD: cGcxMjM0NTY=  # base64: pg123456
    API_KEY: YXBpa2V5MTIzNDU2         # base64: apikey123456
