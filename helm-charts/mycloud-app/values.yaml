# 默认配置值
# 可以在部署时通过 --set 或自定义 values.yaml 覆盖

# 副本数
replicaCount: 2

# 镜像配置
image:
  repository: my-registry.com/myapp  # 镜像仓库地址
  pullPolicy: IfNotPresent
  tag: "latest"  # 镜像标签

# 镜像拉取密钥（私有仓库）
imagePullSecrets: []
# - name: regcred

# 服务账户
serviceAccount:
  create: true
  name: ""

# Pod 注解
podAnnotations: {}

# Pod 安全上下文
podSecurityContext: {}
  # fsGroup: 2000

# 容器安全上下文
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# 服务配置
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  # nodePort: 30080  # 当 type 为 NodePort 时使用

# 应用容器监听端口，默认与 service.targetPort 一致
containerPort: 8080

# Ingress 配置
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: myapp-tls
  #   hosts:
  #     - myapp.example.com

# 资源限制
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# 自动扩缩容
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# 健康检查
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# 环境变量
env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"
  - name: PORT
    value: "8080"

# 链路追踪配置
tracing:
  enabled: true
  endpoint: "http://monitor-service:8090/internal/v1/traces/spans"
  # serviceName 由部署时自动注入（使用 workloadName）

# 从 ConfigMap 加载环境变量
envFrom: []
# - configMapRef:
#     name: myapp-config
# - secretRef:
#     name: myapp-secret

# ConfigMap 数据
configMap:
  enabled: false
  data: {}
    # app.conf: |
    #   key=value

# Secret 数据（base64编码）
secret:
  enabled: false
  data: {}
    # DB_PASSWORD: cGFzc3dvcmQxMjM=

# 持久化存储
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

# 节点选择器
nodeSelector: {}

# 容忍度
tolerations: []

# 亲和性
affinity: {}

# 额外的标签
labels: {}

# Pod 中断预算
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# =============================================================================
# Istio 服务网格配置
# =============================================================================
istio:
  # 是否启用 Istio 资源创建
  enabled: false

  # VirtualService 流量路由配置
  virtualService:
    # 主机列表 (默认: <service>.<namespace>.svc.cluster.local)
    hosts: []
    # gateways 列表 (默认: mesh)
    gateways:
    - mesh
    # 导出到的命名空间列表
    exportTo:
    - "."
    # K8s Service host (默认: release fullname)
    host: ""
    # stable 子集名
    stableSubset: "stable"
    # canary 子集名
    canarySubset: "canary"
    # stable 流量权重 (默认 80)
    stableWeight: 80
    # canary 流量权重 (默认 20)
    canaryWeight: 20
    # 请求超时，如 "10s", "500ms"
    timeout: ""
    # 重试策略
    retries:
      attempts: 3
      perTryTimeout: "2s"
      retryOn: "connect-failure,refused-stream"
    # 故障注入 (调试用途)
    fault: {}
      # delay:
      #   percent: 100
      #   fixedDelay: "5s"
      # abort:
      #   percent: 100
      #   httpStatus: 500
    # 流量镜像
    mirror: {}
      # host: mirror-service
      # subset: v1
    # mirrorPercentage: 100
    # CORS 策略
    corsPolicy: {}
    # Header 匹配路由 (基于 header 的流量路由)
    headerMatches: []
    # - headerName: "x-canary-version"
    #   headerValue: "v2"
    #   subset: "canary"
    #   uri:
    #     matchType: "prefix"
    #     value: "/"
    # 额外标签
    labels: {}
    # 注解
    annotations: {}

  # DestinationRule 流量策略配置
  destinationRule:
    # K8s Service host (默认: release fullname)
    host: ""
    # 子集定义
    subsets:
    - name: "stable"
      labels:
        version: "stable"
    - name: "canary"
      labels:
        version: "canary"
    # 全局流量策略
    trafficPolicy: {}
      # loadBalancer:
      #   simple: ROUND_ROBIN
      # connectionPool:
      #   tcp:
      #     maxConnections: 100
      #   http:
      #     http1MaxPendingRequests: 1
      #     http2MaxRequests: 100
      #     maxRequestsPerConnection: 1
      # outlierDetection:
      #   consecutiveErrors: 5
      #   interval: "30s"
      #   baseEjectionTime: "30s"
      #   maxEjectionPercent: 50
      # tls:
      #   mode: ISTIO_MUTUAL
    # 导出到的命名空间列表
    exportTo:
    - "."
    # 额外标签
    labels: {}

  # Gateway 入口网关配置
  gateway:
    enabled: false
    name: ""  # 默认使用 release fullname
    selector:
      istio: ingressgateway
    servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
      - "*"
    # - port:
    #     number: 443
    #     name: https
    #     protocol: HTTPS
    #   hosts:
    #   - "example.com"
    #   tls:
    #     mode: SIMPLE
    #     credentialName: example-tls
    labels: {}

  # PeerAuthentication mTLS 认证配置
  peerAuthentication:
    enabled: false
    name: "default"
    mode: "PERMISSIVE"  # UNSET, DISABLE, PERMISSIVE, STRICT
    selector: {}
      # app: myapp
