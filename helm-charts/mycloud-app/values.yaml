# 默认配置值
# 可以在部署时通过 --set 或自定义 values.yaml 覆盖

# 副本数
replicaCount: 2

# 镜像配置
image:
  repository: my-registry.com/myapp  # 镜像仓库地址
  pullPolicy: IfNotPresent
  tag: "latest"  # 镜像标签

# 镜像拉取密钥（私有仓库）
imagePullSecrets: []
# - name: regcred

# 服务账户
serviceAccount:
  create: true
  name: ""

# Pod 注解
podAnnotations: {}

# Pod 安全上下文
podSecurityContext: {}
  # fsGroup: 2000

# 容器安全上下文
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# 服务配置
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  # nodePort: 30080  # 当 type 为 NodePort 时使用

# 应用容器监听端口，默认与 service.targetPort 一致
containerPort: 8080

# Ingress 配置
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: myapp-tls
  #   hosts:
  #     - myapp.example.com

# 资源限制
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# 自动扩缩容
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# 健康检查
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# 环境变量
env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"
  - name: PORT
    value: "8080"

# 链路追踪配置
tracing:
  enabled: true
  endpoint: "http://monitor-service:8090/internal/v1/traces/spans"
  # serviceName 由部署时自动注入（使用 workloadName）

# 从 ConfigMap 加载环境变量
envFrom: []
# - configMapRef:
#     name: myapp-config
# - secretRef:
#     name: myapp-secret

# ConfigMap 数据
configMap:
  enabled: false
  data: {}
    # app.conf: |
    #   key=value

# Secret 数据（base64编码）
secret:
  enabled: false
  data: {}
    # DB_PASSWORD: cGFzc3dvcmQxMjM=

# 持久化存储
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

# 节点选择器
nodeSelector: {}

# 容忍度
tolerations: []

# 亲和性
affinity: {}

# 额外的标签
labels: {}

# Pod 中断预算
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
