apiVersion: v1
kind: Namespace
metadata:
  name: kubecost

---
# Kubecost cost-analyzer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecost-cost-analyzer
  namespace: kubecost
  labels:
    app: kubecost-cost-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecost-cost-analyzer
  template:
    metadata:
      labels:
        app: kubecost-cost-analyzer
    spec:
      containers:
      - name: cost-model
        image: 172.18.0.1:5001/kubecost/cost-model:2.9.0
        imagePullPolicy: IfNotPresent
        env:
        - name: PROMETHEUS_SERVER_ENDPOINT
          value: "http://172.18.0.1:9091"
        - name: CLOUD_PROVIDER_API_KEY
          value: ""
        - name: CLUSTER_ID
          value: "docker-desktop"
        ports:
        - containerPort: 9003
          name: http
        readinessProbe:
          httpGet:
            path: /costDataModel
            port: 9003
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      - name: cost-analyzer-frontend
        image: 172.18.0.1:5001/kubecost/frontend:2.9.0
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
        ports:
        - containerPort: 9090
          name: frontend
        readinessProbe:
          httpGet:
            path: /
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
# Kubecost Service
apiVersion: v1
kind: Service
metadata:
  name: kubecost-cost-analyzer
  namespace: kubecost
  labels:
    app: kubecost-cost-analyzer
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    name: frontend
  - port: 9003
    targetPort: 9003
    name: cost-model
  selector:
    app: kubecost-cost-analyzer
