---
# ConfigMap: 存储 containerd registry 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-registry-cert
  namespace: kube-system
data:
  hosts.toml: |
    server = "http://172.18.0.1:5001"

    [host."http://172.18.0.1:5001"]
      capabilities = ["pull", "resolve"]
      skip_verify = true
---
# DaemonSet: 在每个 K8s 节点上初始化 containerd 证书配置
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-cert-init
  namespace: kube-system
  labels:
    app: registry-cert-init
spec:
  selector:
    matchLabels:
      app: registry-cert-init
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: registry-cert-init
    spec:
      # 优先调度到 worker 节点
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      hostPID: false
      # 注意: 使用本地 registry 镜像避免依赖 Docker Hub
      # 首次部署前需要执行: ctr images pull 172.18.0.1:5001/library/busybox:1.36
      # 镜像缓存在 /var/lib/containerd/ (持久化 volume)，重启后 IfNotPresent 可直接使用缓存
      initContainers:
        - name: copy-cert
          image: 172.18.0.1:5001/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              TARGET="/host-etc/containerd/certs.d/172.18.0.1:5001"
              mkdir -p "${TARGET}"
              cp /config/hosts.toml "${TARGET}/hosts.toml"
              echo "[$(date)] Registry cert written to ${TARGET}/hosts.toml"
              cat "${TARGET}/hosts.toml"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: host-containerd-etc
              mountPath: /host-etc/containerd
      containers:
        - name: sleep
          image: 172.18.0.1:5001/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      terminationGracePeriodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: local-registry-cert
        - name: host-containerd-etc
          hostPath:
            path: /etc/containerd
            type: DirectoryOrCreate
