# JSON 格式的 trace 日志（供 trace-log-reader 消费）
log_format trace_json escape=json '{'
    '"time":"$time_iso8601",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"duration":$request_time,'
    '"request_id":"$http_x_request_id",'
    '"remote_addr":"$remote_addr",'
    '"user_agent":"$http_user_agent"'
    '}';

server {
    listen 80;
    server_name app-1.local;

    # trace 日志（写入独立文件，供 trace-log-reader 消费上报到 monitor-service）
    access_log /var/log/nginx/access_trace.log trace_json;

    location / {
        proxy_pass http://host.docker.internal:30080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 禁用 JS/CSS 缓存（开发环境）
    location /assets {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /api {
        resolver 127.0.0.11 valid=10s;
        set $upstream gateway:8080;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /internal {
        resolver 127.0.0.11 valid=10s;
        set $upstream gateway:8080;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
