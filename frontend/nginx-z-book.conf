# book.com → K8s Ingress Controller 反向代理
server {
    listen 80;
    server_name book.com;

    # trace 日志（写入 trace-log-reader 监控的文件）
    access_log /var/log/nginx/access_trace.log trace_json;

    # 代理所有请求到 K8s Ingress Controller（通过 host 上的 port-forward）
    location / {
        proxy_pass http://host.docker.internal:8888;
        proxy_set_header Host book.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
