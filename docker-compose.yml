services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: my-cloud-mysql
    command: --max_connections=500 --max_connect_errors=1000 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: iam_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - my-cloud-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: my-cloud-redis
    ports:
      - "6379:6379"
    networks:
      - my-cloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Gateway
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    container_name: my-cloud-gateway
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=root:root123456@tcp(mysql:3306)/iam_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Auth Service
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: my-cloud-auth-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - DB_DSN=root:root123456@tcp(mysql:3306)/iam_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
      - UPLOAD_DIR=/data/uploads
    volumes:
      - upload_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Project Service
  project-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: project-service
    container_name: my-cloud-project-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - DB_DSN=root:root123456@tcp(mysql:3306)/org_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Application Service
  application-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: application-service
    container_name: my-cloud-application-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - DB_DSN=root:root123456@tcp(mysql:3306)/app_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Environment Service
  env-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: env-service
    container_name: my-cloud-env-service
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - DB_DSN=root:root123456@tcp(mysql:3306)/env_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Cluster Service
  cluster-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: cluster-service
    container_name: my-cloud-cluster-service
    ports:
      - "8088:8088"
    environment:
      - SERVER_PORT=8088
      - DB_DSN=root:root123456@tcp(mysql:3306)/infra_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Pipeline Service
  pipeline-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: pipeline-service
    container_name: my-cloud-pipeline-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - DB_DSN=root:root123456@tcp(mysql:3306)/devops_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_USER=admin
      - JENKINS_TOKEN=admin123
      - WEBHOOK_BASE_URL=https://9b3370809159f887-61-119-121-206.serveousercontent.com
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Release Service
  release-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: release-service
    container_name: my-cloud-release-service
    ports:
      - "8086:8086"
    environment:
      - SERVER_PORT=8086
      - DB_DSN=root:root123456@tcp(mysql:3306)/release_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Deploy Service
  deploy-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: deploy-service
    container_name: my-cloud-deploy-service
    ports:
      - "8087:8087"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SERVER_PORT=8087
      - DB_DSN=root:root123456@tcp(mysql:3306)/deploy_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
      - KUBECONFIG=/root/.kube/config
      - HELM_CHART_PATH=/root/helm-charts/mycloud-app
    volumes:
      - ./configs/kubeconfig:/root/.kube/config:ro
      - ./helm-charts:/root/helm-charts:ro
      - ./helm-charts:/helm-charts:ro
      - ./helm-charts:/app/helm-charts:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Audit Service
  audit-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: audit-service
    container_name: my-cloud-audit-service
    restart: always
    ports:
      - "8093:8093"
    environment:
      - SERVER_PORT=8093
      - DB_DSN=root:root123456@tcp(mysql:3306)/audit_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network

  # Notification Service
  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: my-cloud-notification-service
    ports:
      - "8095:8095"
    environment:
      - SERVER_PORT=8095
      - DB_DSN=root:root123456@tcp(mysql:3306)/notification_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-cloud-network
    restart: on-failure

  # Monitor Service
  monitor-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: monitor-service
    container_name: my-cloud-monitor-service
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      - DB_DSN=root:root123456@tcp(mysql:3306)/monitor_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - JWT_SECRET=my-cloud-secret-key-change-this-in-production
      - KUBECONFIG=/root/.kube/config
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /tmp/kubeconfig-container:/root/.kube/config:ro
    networks:
      - my-cloud-network
    restart: on-failure

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-cloud-frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - my-cloud-network
    restart: on-failure

  # Jenkins CI Server
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: my-cloud-jenkins
    user: root  # 使用root用户运行，获取Docker socket权限
    ports:
      - "9090:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--prefix=/
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./jenkins/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - my-cloud-network
    restart: on-failure

  # Local Docker Registry
  registry:
    image: registry:2
    container_name: my-cloud-registry
    ports:
      - "5001:5000"
    environment:
      - REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/data
    volumes:
      - registry_data:/data
    networks:
      - my-cloud-network
    restart: on-failure

  # ChartMuseum - Helm Chart Repository
  chartmuseum:
    image: ghcr.io/helm/chartmuseum:v0.16.0
    container_name: my-cloud-chartmuseum
    ports:
      - "8092:8080"
    environment:
      - DEBUG=1
      - STORAGE=local
      - STORAGE_LOCAL_ROOTDIR=/charts
      - DISABLE_API=false
      - ALLOW_OVERWRITE=true
    volumes:
      - ./charts-storage:/charts
    networks:
      - my-cloud-network
    restart: on-failure

  # Prometheus - 指标采集与存储
  prometheus:
    image: prom/prometheus:latest
    container_name: my-cloud-prometheus
    ports:
      - "9091:9090"   # 宿主机 9091 → 容器 9090（避免与 Jenkins 占用的 9090 冲突）
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - my-cloud-network
    restart: on-failure

  # Grafana - 监控看板
  grafana:
    image: grafana/grafana:11.2.0
    container_name: my-cloud-grafana
    ports:
      - "3000:3000"
    environment:
      # 管理员账号
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123456
      # 允许 iframe 嵌入（前端监控看板使用）
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=none
      - GF_SECURITY_COOKIE_SECURE=false
      # 允许匿名访问以便 iframe 直接展示（只读 Viewer 角色）
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # 关闭登录页跳转（iframe 友好）
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # 数据源/Dashboard 自动 provisioning
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - my-cloud-network
    restart: on-failure

networks:
  my-cloud-network:
    driver: bridge

volumes:
  mysql_data:
  jenkins_data:
  upload_data:
  registry_data:
  prometheus_data:
  grafana_data:
